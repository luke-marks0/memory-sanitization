syntax = "proto3";

package pose.v1;

service PoseSessionService {
  rpc Discover(DiscoverRequest) returns (DiscoverResponse);
  rpc PlanSession(PlanSessionRequest) returns (PlanSessionResponse);
  rpc LeaseRegions(LeaseRegionsRequest) returns (LeaseRegionsResponse);
  rpc GenerateInnerPoRep(GenerateInnerPoRepRequest) returns (GenerateInnerPoRepResponse);
  rpc MaterializeRegionPayloads(MaterializeRegionPayloadsRequest) returns (MaterializeRegionPayloadsResponse);
  rpc CommitRegions(CommitRegionsRequest) returns (CommitRegionsResponse);
  rpc VerifyInnerProofs(VerifyInnerProofsRequest) returns (VerifyInnerProofsResponse);
  rpc ChallengeOuter(ChallengeOuterRequest) returns (ChallengeOuterResponse);
  rpc VerifyOuter(VerifyOuterRequest) returns (VerifyOuterResponse);
  rpc Finalize(FinalizeRequest) returns (FinalizeResponse);
  rpc Cleanup(CleanupRequest) returns (CleanupResponse);
}

message DiscoverRequest {
  string protocol_version = 1;
}

message DiscoverResponse {
  string protocol_version = 1;
  repeated string capabilities = 2;
}

message PlanSessionRequest {
  string protocol_version = 1;
  SessionPlan plan = 2;
}

message ChallengePolicy {
  double epsilon = 1;
  uint32 lambda_bits = 2;
  uint32 max_challenges = 3;
}

message DeadlinePolicy {
  uint32 response_deadline_ms = 1;
  uint32 session_timeout_ms = 2;
}

message CleanupPolicy {
  bool zeroize = 1;
  bool verify_zeroization = 2;
}

message RegionPlan {
  string region_id = 1;
  string region_type = 2;
  uint64 usable_bytes = 3;
  uint32 gpu_device = 4;
}

message SectorPlanEntry {
  string region_id = 1;
  uint32 unit_index = 2;
  string piece_bytes_hex = 3;
  string prover_id_hex = 4;
  uint64 sector_id = 5;
  string ticket_hex = 6;
  string seed_hex = 7;
  string porep_id_hex = 8;
  bool verify_after_seal = 9;
}

message SessionPlan {
  string session_id = 1;
  string nonce = 2;
  string profile_name = 3;
  string porep_unit_profile = 4;
  uint32 challenge_leaf_size = 5;
  ChallengePolicy challenge_policy = 6;
  DeadlinePolicy deadline_policy = 7;
  CleanupPolicy cleanup_policy = 8;
  uint32 unit_count = 9;
  repeated RegionPlan regions = 10;
  repeated SectorPlanEntry sector_plan = 11;
}

message PlanSessionResponse {
  string session_id = 1;
  bool accepted = 2;
  repeated string notes = 3;
}

message LeaseRegionsRequest {
  string protocol_version = 1;
  string session_id = 2;
  repeated LeaseRecord leases = 3;
}

message LeaseRecord {
  string region_id = 1;
  string region_type = 2;
  uint64 usable_bytes = 3;
  string lease_handle = 4;
  string lease_expiry = 5;
  CleanupPolicy cleanup_policy = 6;
}

message LeaseRegionsResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message GenerateInnerPoRepRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message InnerProofArtifact {
  string region_id = 1;
  string artifact_json = 2;
}

message GenerateInnerPoRepResponse {
  repeated InnerProofArtifact artifacts = 1;
  repeated string notes = 2;
}

message MaterializeRegionPayloadsRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message RegionCommitment {
  string region_id = 1;
  string region_root_hex = 2;
  uint64 covered_bytes = 3;
  uint64 real_porep_bytes = 4;
  uint64 tail_filler_bytes = 5;
  string region_manifest_json = 6;
}

message MaterializeRegionPayloadsResponse {
  repeated RegionCommitment commitments = 1;
  map<string, uint32> timings_ms = 2;
  repeated string notes = 3;
}

message CommitRegionsRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message CommitRegionsResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message VerifyInnerProofsRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message VerifyInnerProofsResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message OuterChallenge {
  string region_id = 1;
  repeated uint64 leaf_indices = 2;
  string session_manifest_root = 3;
}

message ChallengeOuterRequest {
  string protocol_version = 1;
  string session_id = 2;
  repeated OuterChallenge challenges = 3;
}

message OuterOpening {
  string region_id = 1;
  string session_manifest_root = 2;
  uint64 leaf_index = 3;
  bytes leaf_bytes = 4;
  repeated bytes auth_path = 5;
}

message ChallengeOuterResponse {
  repeated OuterOpening openings = 1;
  uint32 response_ms = 2;
  repeated string notes = 3;
}

message VerifyOuterRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message VerifyOuterResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message FinalizeRequest {
  string protocol_version = 1;
  string session_id = 2;
  string verdict = 3;
  bool success = 4;
  bool retain_session = 5;
}

message FinalizeResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message CleanupRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message CleanupResponse {
  bool cleaned = 1;
  string cleanup_status = 2;
  repeated string notes = 3;
}
