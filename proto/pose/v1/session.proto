syntax = "proto3";

package pose.v1;

service PoseSessionService {
  rpc Discover(DiscoverRequest) returns (DiscoverResponse);
  rpc PlanSession(PlanSessionRequest) returns (PlanSessionResponse);
  rpc LeaseRegions(LeaseRegionsRequest) returns (LeaseRegionsResponse);
  rpc SeedSession(SeedSessionRequest) returns (SeedSessionResponse);
  rpc MaterializeLabels(MaterializeLabelsRequest) returns (MaterializeLabelsResponse);
  rpc PrepareFastPhase(PrepareFastPhaseRequest) returns (PrepareFastPhaseResponse);
  rpc RunFastPhase(RunFastPhaseRequest) returns (RunFastPhaseResponse);
  rpc Finalize(FinalizeRequest) returns (FinalizeResponse);
  rpc Cleanup(CleanupRequest) returns (CleanupResponse);
}

message DiscoverRequest {
  string protocol_version = 1;
}

message DiscoverResponse {
  string protocol_version = 1;
  repeated string capabilities = 2;
}

message PlanSessionRequest {
  string protocol_version = 1;
  SessionPlan plan = 2;
}

message ChallengePolicy {
  uint32 rounds_r = 1;
  double target_success_bound = 2;
  bool sample_with_replacement = 3;
}

message DeadlinePolicy {
  uint32 response_deadline_us = 1;
  uint32 session_timeout_ms = 2;
}

message CleanupPolicy {
  bool zeroize = 1;
  bool verify_zeroization = 2;
}

message RegionPlan {
  string region_id = 1;
  string region_type = 2;
  uint64 usable_bytes = 3;
  uint64 slot_count = 4;
  uint64 covered_bytes = 5;
  uint64 slack_bytes = 6;
  uint32 gpu_device = 7;
}

message SessionPlan {
  string session_id = 1;
  string session_seed_hex = 2;
  string profile_name = 3;
  string graph_family = 4;
  uint32 graph_parameter_n = 5;
  ChallengePolicy challenge_policy = 6;
  DeadlinePolicy deadline_policy = 7;
  CleanupPolicy cleanup_policy = 8;
  uint64 label_count_m = 9;
  repeated RegionPlan regions = 10;
  uint64 gamma = 11;
  uint32 label_width_bits = 12;
  string hash_backend = 13;
  string graph_descriptor_digest = 14;
  string adversary_model = 15;
  uint64 attacker_budget_bytes_assumed = 16;
  uint64 q_bound = 17;
  repeated string claim_notes = 18;
}

message PlanSessionResponse {
  string session_id = 1;
  bool accepted = 2;
  repeated string notes = 3;
}

message LeaseRegionsRequest {
  string protocol_version = 1;
  string session_id = 2;
  repeated LeaseRecord leases = 3;
}

message LeaseRecord {
  string region_id = 1;
  string region_type = 2;
  uint64 usable_bytes = 3;
  uint64 slot_count = 4;
  uint64 slack_bytes = 5;
  string lease_handle = 6;
  string lease_expiry = 7;
  CleanupPolicy cleanup_policy = 8;
  uint32 gpu_device = 9;
}

message LeaseRegionsResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message SeedSessionRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message SeedSessionResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message MaterializeLabelsRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message RegionMaterialization {
  string region_id = 1;
  uint64 covered_bytes = 2;
  uint64 slack_bytes = 3;
  uint64 declared_stage_copy_bytes = 4;
}

message MaterializeLabelsResponse {
  repeated RegionMaterialization regions = 1;
  map<string, uint32> timings_ms = 2;
  repeated string notes = 3;
  string graph_descriptor_digest = 4;
  uint64 scratch_peak_bytes = 5;
}

message PrepareFastPhaseRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message PrepareFastPhaseResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message FastRoundChallenge {
  string protocol_version = 1;
  string session_id = 2;
  uint32 round_index = 3;
  uint64 challenge_index = 4;
}

message FastRoundResponse {
  string region_id = 1;
  uint64 challenge_index = 2;
  bytes label_bytes = 3;
  uint32 round_trip_us = 4;
}

message RunFastPhaseRequest {
  repeated FastRoundChallenge rounds = 1;
}

message RunFastPhaseResponse {
  repeated FastRoundResponse responses = 1;
  repeated string notes = 2;
}

message FinalizeRequest {
  string protocol_version = 1;
  string session_id = 2;
  string verdict = 3;
  bool success = 4;
  bool retain_session = 5;
}

message FinalizeResponse {
  bool accepted = 1;
  repeated string notes = 2;
}

message CleanupRequest {
  string protocol_version = 1;
  string session_id = 2;
}

message CleanupResponse {
  bool cleaned = 1;
  string cleanup_status = 2;
  repeated string notes = 3;
}
